version: '3.9'

services:
  tagger:
    build: .
    ports:
      - '8002:8000'
    volumes:
      - ~/.cache/huggingface:/cache/huggingface
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 5        # longer retries — 3 models take time to load
      start_period: 60s
    restart: unless-stopped
