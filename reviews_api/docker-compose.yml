version: '3.9'

services:
  classifier:
    build: .
    ports:
      - '8000:8000'
    volumes:
      # Mount local HuggingFace cache — models download once, never again
      - ~/.cache/huggingface:/cache/huggingface
    environment:
      - APP_ENV=production
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
